  <script>

    window.onload = function () {

  <script>
    // Debug mobile navigation
    document.addEventListener('DOMContentLoaded', function () {
      console.log('Bootstrap loaded:', typeof bootstrap !== 'undefined');
      console.log('Offcanvas element:', document.getElementById('offcanvasNav'));
      console.log('Toggler element:', document.querySelector('.navbar-toggler'));

      // Test if offcanvas can be manually triggered
      const offcanvasElement = document.getElementById('offcanvasNav');
      if (offcanvasElement) {
        const offcanvas = new bootstrap.Offcanvas(offcanvasElement);
        console.log('Offcanvas instance created:', offcanvas);
      }
    });

    // Mobile back to top functionality
    document.addEventListener('DOMContentLoaded', function () {
      const mobileBackToTop = document.getElementById("mobileBackToTop");
      if (mobileBackToTop) {
        mobileBackToTop.addEventListener("click", function (e) {
          e.preventDefault();
          window.scrollTo({
            top: 0,
            behavior: "smooth"
          });
        });

        // Show/hide mobile back to top button based on scroll
        window.addEventListener("scroll", function () {
          if (window.scrollY > 300) {
            mobileBackToTop.style.opacity = "1";
            mobileBackToTop.style.visibility = "visible";
          } else {
            mobileBackToTop.style.opacity = "0";
            mobileBackToTop.style.visibility = "hidden";
          }
        });
      }
    });
  </script>
  <script>
    const ArrowToTop = document.getElementById("ArrowToTop");
    window.onscroll = function () {
      "use strict";
      if (
        document.body.scrollTop >= 800 ||
        document.documentElement.scrollTop >= 800
      ) {
        ArrowToTop.classList.add("d-flex");
        ArrowToTop.classList.remove("d-none");
      } else {
        ArrowToTop.classList.add("d-none");
        ArrowToTop.classList.remove("d-flex");
      }
    };
  </script>
